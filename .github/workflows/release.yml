name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools
        run: make tools

      - name: Format checks
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Run go vet
        run: go vet ./...

  verify-native-binary:
    name: Verify native binary (${{ matrix.goos }})
    needs: quality
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            binary_name: ralph
          - runner: macos-latest
            goos: darwin
            binary_name: ralph
          - runner: windows-latest
            goos: windows
            binary_name: ralph.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build native binary
        shell: bash
        run: |
          native_goarch="$(go env GOARCH)"
          env GOOS="${{ matrix.goos }}" GOARCH="$native_goarch" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v}" \
            -o "$RUNNER_TEMP/${{ matrix.binary_name }}" ./cmd/ralph

      - name: Verify native binary
        shell: bash
        run: |
          go run ./tools/releaseverify \
            --binary "$RUNNER_TEMP/${{ matrix.binary_name }}" \
            --version "${GITHUB_REF_NAME#v}"

  build-artifacts:
    name: Build release archive (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: ralph
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            binary_name: ralph
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            binary_name: ralph
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            binary_name: ralph
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            binary_name: ralph.exe
            archive_ext: zip
          - goos: windows
            goarch: arm64
            binary_name: ralph.exe
            archive_ext: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        shell: bash
        run: |
          mkdir -p dist/bin
          env GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v}" \
            -o "dist/bin/${{ matrix.binary_name }}" ./cmd/ralph

      - name: Package release archive
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset_base="ralph_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          stage_dir="$RUNNER_TEMP/$asset_base"
          mkdir -p "$stage_dir"

          cp "dist/bin/${{ matrix.binary_name }}" "$stage_dir/${{ matrix.binary_name }}"
          cp README.md LICENSE "$stage_dir/"

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (
              cd "$stage_dir"
              zip -q -r "$RUNNER_TEMP/$asset_base.zip" .
            )
            echo "asset_path=$RUNNER_TEMP/$asset_base.zip" >> "$GITHUB_OUTPUT"
          else
            tar -C "$stage_dir" -czf "$RUNNER_TEMP/$asset_base.tar.gz" .
            echo "asset_path=$RUNNER_TEMP/$asset_base.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - verify-native-binary
      - build-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/release
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          (
            cd dist/release
            shasum -a 256 * > checksums.txt
          )

      - name: Publish or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' files < <(find dist/release -type f -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi

      - name: Require Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is required to update richclement/homebrew-tap" >&2
            exit 1
          fi

      - name: Check out Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: richclement/homebrew-tap
          ref: main
          path: dist/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate Homebrew formula update
        shell: bash
        run: |
          go run ./tools/homebrewtap \
            --version "${GITHUB_REF_NAME#v}" \
            --checksums-file "dist/release/checksums.txt" \
            --tap-dir "dist/homebrew-tap" \
            --formula-name "ralph-cli" \
            --binary-name "ralph" \
            --source-repo "${GITHUB_REPOSITORY}" \
            --pr-body-file "$RUNNER_TEMP/ralph-cli-homebrew-pr-body.md"

      - name: Create Homebrew tap pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: dist/homebrew-tap
          commit-message: "ralph-cli: update to ${{ github.ref_name }}"
          title: "ralph-cli: update to ${{ github.ref_name }}"
          body-path: ${{ runner.temp }}/ralph-cli-homebrew-pr-body.md
          branch: ralph-cli-release-${{ github.ref_name }}
          base: main
          add-paths: |
            Formula/ralph-cli.rb
